<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intelectta.com</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #07111f;
      overflow: hidden;
    }

    body {
      position: relative;
      color: #ffffff;
    }

    .bg {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(7, 17, 31, 0.35), rgba(7, 17, 31, 0.48)),
        url('intelectta_bg.png') center center / cover no-repeat;
      transform: scale(1.08);
      filter: blur(8px) saturate(1.1);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(43, 131, 255, 0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(0, 214, 201, 0.12), transparent 30%),
        linear-gradient(135deg, rgba(3, 10, 24, 0.30), rgba(3, 10, 24, 0.55));
    }

    .frame {
      position: fixed;
      border: 2px solid rgba(0, 174, 255, 0.28);
      border-radius: 28px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.03) inset;
      pointer-events: none;
    }

    .frame.one {
      width: 360px;
      height: 220px;
      top: 8%;
      left: 6%;
      border-color: rgba(0, 183, 255, 0.30);
    }

    .frame.two {
      width: 260px;
      height: 160px;
      right: 8%;
      top: 14%;
      border-color: rgba(255, 119, 0, 0.28);
    }

    .frame.three {
      width: 300px;
      height: 180px;
      left: 12%;
      bottom: 10%;
      border-color: rgba(0, 255, 187, 0.22);
    }

    .frame.four {
      width: 240px;
      height: 140px;
      right: 14%;
      bottom: 12%;
      border-color: rgba(130, 90, 255, 0.22);
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      width: min(1200px, calc(100% - 40px));
      margin: 22px auto 0;
      padding: 14px 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .brand {
      letter-spacing: 0.36em;
      font-size: 18px;
      font-weight: 700;
      color: rgba(255,255,255,0.92);
    }

    .nav {
      display: flex;
      gap: 26px;
      color: rgba(255,255,255,0.60);
      font-size: 13px;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .panel-wrap {
      position: relative;
      width: 100%;
      max-width: 520px;
    }

    .panel-outline {
      position: absolute;
      inset: -12px;
      border-radius: 34px;
      border: 2px solid rgba(0, 195, 255, 0.35);
      box-shadow:
        0 0 0 6px rgba(255,255,255,0.04),
        0 0 60px rgba(0, 153, 255, 0.12);
    }

    .panel-outline::after {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 24px;
      border: 1px solid rgba(255, 166, 0, 0.28);
      pointer-events: none;
    }

    .panel {
      position: relative;
      border-radius: 28px;
      padding: 34px 30px 30px;
      background: rgba(8, 18, 33, 0.62);
      border: 1px solid rgba(255,255,255,0.14);
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 80px rgba(0,0,0,0.42);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(132, 220, 255, 0.88);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 42px;
      line-height: 1.05;
      font-weight: 700;
      color: #ffffff;
    }

    .sub {
      margin: 0 0 28px 0;
      color: rgba(255,255,255,0.68);
      font-size: 15px;
      line-height: 1.6;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: rgba(255,255,255,0.76);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 15px 16px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.16);
      outline: none;
      background: rgba(255,255,255,0.09);
      color: #fff;
      font-size: 15px;
      backdrop-filter: blur(8px);
    }

    .field input::placeholder {
      color: rgba(255,255,255,0.42);
    }

    .field input:focus {
      border-color: rgba(85, 200, 255, 0.85);
      box-shadow: 0 0 0 4px rgba(85, 200, 255, 0.12);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px 16px;
      border: 0;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #04111f;
      background: linear-gradient(180deg, #ffffff 0%, #cfefff 100%);
      box-shadow: 0 10px 30px rgba(134, 214, 255, 0.18);
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    @media (max-width: 760px) {
      .nav { display: none; }
      .topbar {
        width: calc(100% - 24px);
        margin-top: 12px;
        padding: 12px 16px;
      }
      .brand { font-size: 15px; }
      h1 { font-size: 34px; }
      .panel { padding: 26px 20px 22px; }
      .frame { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="frame one"></div>
  <div class="frame two"></div>
  <div class="frame three"></div>
  <div class="frame four"></div>

  <div class="page">
    <div class="topbar">
      <div class="brand">INTELECTTA</div>
      <div class="nav">
        <span>Solutions</span>
        <span>Security</span>
        <span>Infrastructure</span>
        <span>Contact</span>
      </div>
    </div>

    <main class="main">
      <div class="panel-wrap">
        <div class="panel-outline"></div>
        <section class="panel">
          <div class="eyebrow">Intelectta.com</div>
          <h1>Enter Credentials</h1>
          <p class="sub">Authorized access only. Enter your credentials to continue into the private environment.</p>

          <form>
            <div class="field">
              <label for="username">Username</label>
              <input id="username" type="text" placeholder="Enter username" />
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input id="password" type="password" placeholder="Enter password" />
            </div>

            <button class="btn" type="button">Access Portal</button>
          </form>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
